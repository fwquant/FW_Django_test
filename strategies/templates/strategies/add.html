<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加量化策略</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        form { max-width: 500px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #0066cc; color: white; padding: 8px 20px; border: none; border-radius: 3px; cursor: pointer; }
        a { text-decoration: none; color: #0066cc; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>
<h1>✍️ 添加量化策略想法</h1>
<form method="post">
    {% csrf_token %}  <!-- Django必加：防止跨站请求伪造 -->
    <div class="form-group">
        <label>策略名称：</label>
        <input type="text" name="name" required>
    </div>
    <div class="form-group">
        <label>本金（元）：</label>
        <input type="number" step="0.01" name="principal" required>
    </div>
    <div class="form-group">
        <label>预期收益（元）：</label>
        <input type="number" step="0.01" name="expected_profit" required>
    </div>
    <div class="form-group">
        <label>策略描述：</label>
        <textarea name="description" rows="4"></textarea>
    </div>
    <button type="submit">保存策略</button>
</form>
<a href="{% url 'strategy_list' %}">← 返回列表</a>
</body>
</html>
